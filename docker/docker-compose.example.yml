services:
  cosyvoice2-cuda:
    image: ghcr.io/seancheung/cosyvoice-openai-tts-api:cuda-latest
    ports:
      - "8002:8000"
    volumes:
      - ./voices:/voices:ro
      - ./cache:/root/.cache
    environment:
      COSYVOICE_VERSION: "2"
      COSYVOICE_MODEL: "iic/CosyVoice2-0.5B"
      COSYVOICE_FP16: "true"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  cosyvoice3-cuda:
    image: ghcr.io/seancheung/cosyvoice-openai-tts-api:cuda-latest
    ports:
      - "8003:8000"
    volumes:
      - ./voices:/voices:ro
      - ./cache:/root/.cache
    environment:
      COSYVOICE_VERSION: "3"
      COSYVOICE_MODEL: "FunAudioLLM/Fun-CosyVoice3-0.5B-2512"
      COSYVOICE_FP16: "true"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  cosyvoice2-cpu:
    image: ghcr.io/seancheung/cosyvoice-openai-tts-api:latest
    ports:
      - "8012:8000"
    volumes:
      - ./voices:/voices:ro
      - ./cache:/root/.cache
    environment:
      COSYVOICE_VERSION: "2"
      COSYVOICE_MODEL: "iic/CosyVoice2-0.5B"

  cosyvoice3-cpu:
    image: ghcr.io/seancheung/cosyvoice-openai-tts-api:latest
    ports:
      - "8013:8000"
    volumes:
      - ./voices:/voices:ro
      - ./cache:/root/.cache
    environment:
      COSYVOICE_VERSION: "3"
      COSYVOICE_MODEL: "FunAudioLLM/Fun-CosyVoice3-0.5B-2512"
